#绑定地址
bindAddress: ""
#启动端口
port: 8082
#数据目录前缀，配置文件和数据库文件都会存放在此目录下，默认为 ./
#例如设置为 /data 则配置文件路径为 /data/config.yml，数据库路径为 /data/dst-db
dataDir: "./data"
# wincli端口
dstCliPort: 8102
#数据库
database: dst-db
# DST 版本检查 URL
dstVersionUrl: "https://api.dstserverlist.top/api/v2/Server/Version"
# 自动更新模组信息
autoUpdateModinfo:
  enable: false
  checkInterval: 5
  updateCheckInterval: 10
#自动检测 单位都是 分钟
autoCheck:
  # 森林状态检测间隔时间
  masterInterval: 5
  # 洞穴状态检测间隔时间
  cavesInterval: 5
  # 森林模组更新检测间隔时间
  masterModInterval: 10
  # 洞穴模组更新检测间隔时间
  cavesIModInterval: 10
  # 游戏更新检测间隔时间
  gameUpdateInterval: 20
  modUpdatePrompt: "xxx"
  gameUpdatePrompt: "xxx"
