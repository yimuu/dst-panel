name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve release metadata
        id: release
        run: |
          version="${GITHUB_REF_NAME#v}"
          package_name="dst-panel"
          if [ -z "${version}" ] || [ "${version}" = "${GITHUB_REF_NAME}" ]; then
            echo "::error::Release tags must use v<version>."
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "package_name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "linux_archive=${package_name}.${version}.tar.gz" >> "${GITHUB_OUTPUT}"
          echo "windows_archive=${package_name}.${version}-window.zip" >> "${GITHUB_OUTPUT}"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Build frontend
        working-directory: web-ui
        run: |
          npm ci
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,x86_64-pc-windows-gnu

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Validate package versions
        run: |
          version="${{ steps.release.outputs.version }}"
          cargo_version="$(cargo metadata --no-deps --format-version 1 | node -e "let input=''; process.stdin.on('data', d => input += d); process.stdin.on('end', () => { const metadata = JSON.parse(input); const pkg = metadata.packages.find((item) => item.name === 'dst-admin-rust'); console.log(pkg.version); });")"
          frontend_version="$(node -p "require('./web-ui/package.json').version")"
          if [ "${cargo_version}" != "${version}" ]; then
            echo "::error::Cargo.toml version ${cargo_version} does not match tag version ${version}."
            exit 1
          fi
          if [ "${frontend_version}" != "${version}" ]; then
            echo "::error::web-ui/package.json version ${frontend_version} does not match tag version ${version}."
            exit 1
          fi

      - name: Install release toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 zip

      - name: Build Linux binary
        run: RUST_TARGET=x86_64-unknown-linux-gnu ./tools/release/build-linux.sh

      - name: Package Linux release
        env:
          PACKAGE_NAME: ${{ steps.release.outputs.package_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          package_dir="dist/release/linux/${PACKAGE_NAME}.${VERSION}"
          mkdir -p "${package_dir}"
          cp dst-admin-rust config.yml "${package_dir}/"
          cp docker/dst_config "${package_dir}/dst_config"
          cp -R static "${package_dir}/static"
          cp -R web-ui/dist "${package_dir}/dist"
          tar -czf "dist/release/${PACKAGE_NAME}.${VERSION}.tar.gz" -C dist/release/linux "${PACKAGE_NAME}.${VERSION}"

      - name: Build Windows binary
        run: RUST_TARGET=x86_64-pc-windows-gnu ./tools/release/build-windows.sh

      - name: Package Windows release
        env:
          PACKAGE_NAME: ${{ steps.release.outputs.package_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          package_dir="dist/release/windows/${PACKAGE_NAME}.${VERSION}-window"
          mkdir -p "${package_dir}"
          cp dst-admin-rust.exe config.yml "${package_dir}/"
          cp docker/dst_config "${package_dir}/dst_config"
          cp -R static "${package_dir}/static"
          cp -R web-ui/dist "${package_dir}/dist"
          cd dist/release/windows
          zip -r "../${PACKAGE_NAME}.${VERSION}-window.zip" "${PACKAGE_NAME}.${VERSION}-window"

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::Configure DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets before publishing."
            exit 1
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/yimuu/dst-panel:${{ steps.release.outputs.version }}
            docker.io/yimuu/dst-panel:latest

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/release/${{ steps.release.outputs.windows_archive }}
            dist/release/${{ steps.release.outputs.linux_archive }}
