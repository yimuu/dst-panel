name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  VERSION: 1.0.0
  IMAGE_NAME: docker.io/yimuu/dst-panel

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate release tag
        run: |
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "::error::This workflow publishes version ${VERSION}; push tag v${VERSION}."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Build frontend
        working-directory: web-ui
        run: |
          npm ci
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,x86_64-pc-windows-gnu

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install release toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 zip

      - name: Build Linux binary
        run: RUST_TARGET=x86_64-unknown-linux-gnu ./build_linux.sh

      - name: Package Linux release
        run: |
          package_dir="dist/release/linux/dst-admin-go.${VERSION}"
          mkdir -p "${package_dir}"
          cp dst-admin-rust config.yml docker_dst_config "${package_dir}/"
          cp -R static "${package_dir}/static"
          cp -R web-ui/dist "${package_dir}/dist"
          tar -czf "dist/release/dst-admin-go.${VERSION}.tar.gz" -C dist/release/linux "dst-admin-go.${VERSION}"

      - name: Build Windows binary
        run: RUST_TARGET=x86_64-pc-windows-gnu ./build_window.sh

      - name: Package Windows release
        run: |
          package_dir="dist/release/windows/dst-admin-go.${VERSION}-window"
          mkdir -p "${package_dir}"
          cp dst-admin-rust.exe config.yml docker_dst_config "${package_dir}/"
          cp -R static "${package_dir}/static"
          cp -R web-ui/dist "${package_dir}/dist"
          cd dist/release/windows
          zip -r "../dst-admin-go.${VERSION}-window.zip" "dst-admin-go.${VERSION}-window"

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::Configure DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets before publishing."
            exit 1
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/yimuu/dst-panel:${{ env.VERSION }}
            docker.io/yimuu/dst-panel:latest

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.VERSION }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/release/dst-admin-go.1.0.0-window.zip
            dist/release/dst-admin-go.1.0.0.tar.gz
